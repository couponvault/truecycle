<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Prime Device Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="admin-auth.js"></script>
  <script src="productService.js"></script>
    <style>
        :root {
            --admin-primary: #006778;
            --admin-bg: #f0f2f5;
            --admin-sidebar: #1e293b;
            --eco-green: #2ecc71;
        }

        body {
            background-color: var(--admin-bg);
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar (Same as Pricing for consistency) */
        .sidebar {
            width: 260px;
            background: var(--admin-sidebar);
            color: #fff;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--eco-green);
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .nav-link.active {
            background: var(--admin-primary);
        }

        /* Products Management specific */
        .main-content {
            flex-grow: 1;
            padding: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-add {
            background: var(--admin-primary);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .admin-box {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9;
        }

        .admin-table td {
            padding: 15px 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-thumbnail {
            width: 50px;
            height: 50px;
            background: #f8fafc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-thumbnail img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            background: #f1f5f9;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }

        .action-btn:hover {
            background: var(--admin-primary);
            color: #fff;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge-active { background: #dcfce7; color: #15803d; }
        .badge-out { background: #fee2e2; color: #b91c1c; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">
            <i class="fas fa-recycle"></i> Prime Device
        </a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="admin-products.html" class="nav-link active"><i class="fas fa-box"></i> Products</a>
            <a href="admin-edit-product.html?mode=add" class="nav-link"><i class="fas fa-plus-circle"></i> Add Product</a>
            <a href="admin-orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Orders</a>
            <a href="admin-settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="section-header">
            <div>
                <h1 style="font-size: 1.8rem; font-weight: 800; color: #1e293b; margin:0;">Product Inventory</h1>
                <p style="color: #64748b; margin-top:5px;">Manage your refurbished tech catalog here.</p>
            </div>
            <button class="btn-add">
                <i class="fas fa-plus"></i> Add New Product
            </button>
        </div>

        <div class="admin-box">
             <div style="margin-bottom: 20px; display: flex; gap: 15px;">
                 <input type="text" placeholder="Search by name, category or SKU..." style="flex:1; padding:10px 15px; border:1px solid #e2e8f0; border-radius:8px; outline:none;">
                 <select style="padding:10px 15px; border:1px solid #e2e8f0; border-radius:8px; background:white; cursor:pointer;">
                     <option>All Categories</option>
                     <option>Smartphones</option>
                     <option>Laptops</option>
                     <option>Accessories</option>
                 </select>
             </div>
             
             <table class="admin-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="adminProductsBody">
                    <!-- Dynamic Content -->
                </tbody>
             </table>
        </div>
    </main>

    <script src="admin-auth.js"></script>
    <script src="productService.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!productService.isLoaded) {
                await productService.init();
            }
            renderProductsList();
            
            // Search Input listener
            const searchInput = document.querySelector('input[placeholder*="Search by name"]');
            if (searchInput) {
                searchInput.addEventListener('input', () => renderProductsList());
            }

            // Category Filter listener
            const catSelect = document.querySelector('select');
            if (catSelect) {
                catSelect.addEventListener('change', () => renderProductsList());
            }
        });

        function renderProductsList() {
            const tbody = document.getElementById('adminProductsBody');
            if (!tbody) return;

            let products = productService.getProducts();
            const searchInput = document.querySelector('input[placeholder*="Search by name"]');
            const catSelect = document.querySelector('select');
            
            // Apply Search
            if (searchInput && searchInput.value) {
                const q = searchInput.value.toLowerCase();
                products = products.filter(p => 
                    p.name.toLowerCase().includes(q) || 
                    p.category.toLowerCase().includes(q)
                );
            }
            
            // Apply Category Filter
            if (catSelect && catSelect.value !== 'All Categories') {
                const cat = catSelect.value.toLowerCase().replace('smartphones', 'phones');
                products = products.filter(p => p.category === cat);
            }
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px; color:#94a3b8;">No products matching your search.</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr data-id="${p.id}">
                    <td>
                        <div class="product-cell">
                            <div class="product-thumbnail">
                                <img src="${p.images ? p.images[0] : p.img}" alt="${p.name}">
                            </div>
                            <div>
                                <div style="font-weight:700;">${p.name}</div>
                                <div style="font-size:0.75rem; color:#94a3b8;">SKU: TC-${(p.category || 'misc').toUpperCase().substring(0,2)}-${(p.id || 'xxxx').toString().substring(0,4)}</div>
                            </div>
                        </div>
                    </td>
                    <td style="text-transform:capitalize;">${p.category}</td>
                    <td style="font-weight:700;">${CurrencySystem.format(p.basePrice || p.price || 0, '', p.baseCurrency || 'INR')}</td>
                    <td>${p.stock || 10}</td>
                    <td><span class="badge ${p.stock === 0 ? 'badge-out' : 'badge-active'}">${p.stock === 0 ? 'Out of Stock' : 'In Stock'}</span></td>
                    <td align="right">
                        <div class="action-btns">
                            <button class="action-btn" title="Edit Product" onclick="window.location.href='admin-edit-product?id=${p.id}'"><i class="fas fa-edit"></i></button>
                            <button class="action-btn" title="Delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function deleteProduct(id) {
            const products = productService.getProducts();
            const p = products.find(x => x.id === id);
            if (!p) return;

            if (confirm(`Are you sure you want to delete ${p.name}? This action cannot be undone.`)) {
                const row = document.querySelector(`tr[data-id="${id}"]`);
                row.style.opacity = '0';
                row.style.transform = 'translateX(20px)';
                
                setTimeout(() => {
                    productService.deleteProduct(id);
                    renderProductsList(); // re-render to handle search/empty states
                    showToast(`${p.name} deleted successfully.`, 'error');
                }, 300);
            }
        }
        
        // Add New Product Redirect
        document.querySelector('.btn-add').onclick = () => {
            window.location.href = 'admin-edit-product.html?mode=add';
        };
    </script>
  <script src="currencyService.js"></script>
</body>
</html>
