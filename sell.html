<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Your Device - TrueCycle</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar"></nav>
    <main style="padding: 150px 0;">
        <div class="container" style="text-align: center;">
            <i class="fas fa-mobile-alt" style="font-size: 5rem; color: var(--primary); margin-bottom: 30px;"></i>
            <h1>Sell Your Technology</h1>
            <p style="font-size: 1.2rem; color: #666; margin-bottom: 40px;">Get the best value for your old devices. Quick, safe, and transparent.</p>
            
            <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left;">
                <div class="form-group">
                    <label>What are you selling?</label>
                    <select style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem;">
                        <option>iPhone</option>
                        <option>Android Phone</option>
                        <option>Laptop</option>
                        <option>Tablet</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>Device Name/Model</label>
                    <input type="text" placeholder="e.g. iPhone 13, Galaxy S22" style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem;">
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label>Condition</label>
                    <select style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem;">
                        <option>Pristine (No scratches)</option>
                        <option>Good (Minor marks)</option>
                        <option>Fair (Significant use)</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width: 100%; padding: 18px; margin-top: 30px; font-weight: 800;" onclick="alert('Price Valuation is loading... Our agent will contact you shortly!')">Get Instant Offer</button>
            </div>
        </div>
    </main>
    <footer class="footer"></footer>
    <script src="script.js"></script>
</body>
</html>
