low-x: auto;">                <!-- Generated by JS -->            </div>        </div>    </main>    <script src="wishlistService.js?v=2"></script>

    <script>        document.addEventListener('DOMContentLoaded', () => {            renderComparisonTable();        });        const mockSpecs = {            'iPhone 15 Pro': { storage: '128/256/512GB/1TB', display: '6.1-inch LTPO Super Retina XDR', battery: '3274 mAh (A-Grade Refurb)', camera: '48MP + 12MP + 12MP', processor: 'A17 Pro (3nm)' },            'Samsung Galaxy S24 Ultra': { storage: '256/512GB/1TB', display: '6.8-inch Dynamic LTPO AMOLED 2X', battery: '5000 mAh', camera: '200MP + 50MP + 10MP + 12MP', processor: 'Snapdragon 8 Gen 3' },            'OnePlus 12': { storage: '256/512GB', display: '6.82-inch LTPO4 AMOLED', battery: '5400 mAh', camera: '50MP + 64MP + 48MP', processor: 'Snapdragon 8 Gen 3' },            'Google Pixel 8 Pro': { storage: '128/256/512GB/1TB', display: '6.7-inch LTPO OLED', battery: '5050 mAh', camera: '50MP + 48MP + 48MP', processor: 'Google Tensor G3' }        };        function renderComparisonTable() {            const container = document.getElementById('compareTableContainer');            let items = JSON.parse(localStorage.getItem('Prime Device_compare')) || [];            // Data Cleanup: Filter out placeholder/zero items            items = items.filter(p => p.price > 0 && !p.name.includes('Prime Device Device'));                        if (items.length === 0) {                container.innerHTML = `                    <div style="text-align: center; padding: 100px 0;">                        <i class="fas fa-search" style="font-size: 4rem; color: #eee; margin-bottom: 25px;"></i>                        <h2>Your comparison list is empty</h2>                        <p style="margin-bottom: 30px;">Add up to 3 products to compare their features and prices.</p>                        <a href="products.html" class="btn btn-primary">Browse Products</a>                    </div>                `;                return;            }            let html = `<table class="compare-table">                <thead>                    <tr>                        <th class="feature-col">Device</th>                        ${items.map(p => `                            <th class="product-col">                                <div class="compare-product-header">                                    <img src="${p.img}" alt="${p.name}">                                    <h3>${p.name}</h3>                                    <div class="price-tag">${CurrencySystem.format(p.price)}</div>                                    <button class="btn btn-primary btn-sm" style="margin-top:15px; width:100%" onclick="addToCart({target: this.closest('th')})">Add to Cart</button>                                    <button class="btn-remove-compare" onclick="removeFromCompare('${p.id}')">Remove</button>                                </div>                            </th>                        `).join('')}                    </tr>                </thead>                <tbody>                    <tr>                        <td class="feature-col">Display</td>                        ${items.map(p => `<td class="spec-value">${getSpec(p.name, 'display')}</td>`).join('')}                    </tr>                    <tr>                        <td class="feature-col">Processor</td>                        ${items.map(p => `<td class="spec-value">${getSpec(p.name, 'processor')}</td>`).join('')}                    </tr>                    <tr>                        <td class="feature-col">Camera</td>                        ${items.map(p => `<td class="spec-value">${getSpec(p.name, 'camera')}</td>`).join('')}                    </tr>                    <tr>                        <td class="feature-col">Battery</td>                        ${items.map(p => `<td class="spec-value">${getSpec(p.name, 'battery')}</td>`).join('')}                    </tr>                    <tr>                        <td class="feature-col">Storage Options</td>                        ${items.map(p => `<td class="spec-value">${getSpec(p.name, 'storage')}</td>`).join('')}                    </tr>                    <tr>                        <td class="feature-col">Warranty</td>                        ${items.map(p => `<td class="spec-value">12 Months Prime Device Secure Warranty</td>`).join('')}                    </tr>                </tbody>            </table>`;            container.innerHTML = html;        }        function getSpec(name, key) {            // Find key in mockSpecs by partial name match            for (let model in mockSpecs) {                if (name.includes(model)) return mockSpecs[model][key];            }            return key === 'storage' ? '128/256 GB' : 'High-Performance Specifications';        }        function removeFromCompare(id) {            let list = JSON.parse(localStorage.getItem('Prime Device_compare')) || [];            list = list.filter(item => item.id !== id);            localStorage.setItem('Prime Device_compare', JSON.stringify(list));            renderComparisonTable();            if (typeof CompareManager !== 'undefined') CompareManager.updateUI();        }        // Re-inject navbar        document.getElementById('navbar').innerHTML = `            <div class="navbar-top">                <div class="container">                    <span>Ã°Å¸â€œÅ¾ +91 98765 43210 &nbsp;|&nbsp; Ã°Å¸â€œÂ§ sm1807489@gmail.com</span>                    <div>                        <a href="orders.html">Track Order</a> &nbsp;|&nbsp;                        <a href="about.html">About Us</a> &nbsp;|&nbsp;                        <a href="contact.html">Help</a> &nbsp;|&nbsp; <select id="currencySelector" onchange="CurrencySystem.setCurrency(this.value)" style="background:transparent; color:white; border:none; font-size:0.75rem; cursor:pointer; outline:none; font-weight:600;"><option value="INR" style="color:#333">INR (?)</option><option value="USD" style="color:#333">USD ($)</option><option value="GBP" style="color:#333">GBP (Â£)</option><option value="EUR" style="color:#333">EUR (â‚¬)</option><option value="AED" style="color:#333">AED (?.?)</option></select>                    </div>                </div>            </div>            <div class="navbar-main">                <div class="container">                    <a href="index.html" class="logo">                        <img src="logo.png" alt="Prime Device Logo" style="height: 48px; width: auto; display: block; object-fit: contain;">                    </a>                    <div class="nav-links">                        <a href="index.html">Home</a>                        <a href="products.html">Products</a>                        <a href="sell.html">Sell</a>                        <a href="conditions.html">Condition Guide</a>                    </div>                </div>            </div>        `;    </script
